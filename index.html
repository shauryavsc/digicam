<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digicam ♡</title>
<style>
  :root{
    --pink-glow: #ff8fb8;
    --pink-deep: #e6447a;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin:0;
    padding:0;
    min-height:100%;
    background: radial-gradient(ellipse at center, #ffe1ec 0%, #ffc4dc 45%, #ffaecf 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    overflow-x:hidden;
  }

  .device{
    position:relative;
    width:min(95vw, 430px);
    aspect-ratio: 853 / 1844;
    user-select:none;
    -webkit-user-select:none;
    filter: drop-shadow(0 25px 60px rgba(180, 60, 110, 0.35));
  }

  .device img.frame{
    display:block;
    width:100%;
    height:100%;
    pointer-events:none;
    -webkit-user-drag:none;
  }

  /* ---------- LCD SCREEN ---------- */
  .screen{
    position:absolute;
    left: 7.62%;
    top: 18.98%;
    width: 76.2%;
    height: 49.35%;
    border-radius: 4%;
    overflow:hidden;
    background:#1c1c20;
  }

  .screen-stage{
    position:absolute;
    inset:0;
    overflow:hidden;
  }

  .photo{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transform: translateX(0) scale(1);
    transition: opacity 0.35s ease, transform 0.35s ease;
    pointer-events:none;
  }

  .photo.active{
    opacity:1;
    z-index:2;
  }

  .photo.slide-left{
    transform: translateX(-100%);
  }
  .photo.slide-right{
    transform: translateX(100%);
  }

  /* zoom applied to active photo */
  .photo.zoomed{
    transform: scale(var(--zoom, 1));
  }

  /* ---------- HUD overlays on screen ---------- */
  .hud{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:5;
    font-family: "Courier New", monospace;
    color: #ffe3ee;
    text-shadow: 0 0 4px rgba(0,0,0,0.6);
  }

  .hud-top{
    position:absolute;
    top: 3%;
    left: 4%;
    right: 4%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size: clamp(8px, 2.6vw, 13px);
    letter-spacing: 1px;
    opacity:0.9;
  }

  .hud-counter{
    position:absolute;
    bottom: 3%;
    right: 4%;
    font-size: clamp(8px, 2.6vw, 13px);
    letter-spacing: 1px;
    opacity:0.9;
  }

  .zoom-indicator{
    position:absolute;
    bottom: 3%;
    left: 4%;
    font-size: clamp(8px, 2.6vw, 13px);
    letter-spacing: 1px;
    opacity:0.9;
    transition: opacity 0.3s ease;
  }
  .zoom-indicator.hidden{ opacity:0; }

  /* battery / rec icon */
  .rec-dot{
    width: clamp(5px, 1.6vw, 8px);
    height: clamp(5px, 1.6vw, 8px);
    border-radius:50%;
    background:#ff5a8e;
    display:inline-block;
    margin-right:4px;
    box-shadow: 0 0 6px #ff5a8e;
    animation: pulse 1.6s infinite ease-in-out;
  }
  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:0.25; }
  }

  /* ---------- Info overlay (MENU) ---------- */
  .info-overlay{
    position:absolute;
    inset:0;
    background: rgba(20, 14, 22, 0.55);
    backdrop-filter: blur(2px);
    color:#ffe9f2;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding: 6% 6%;
    opacity:0;
    pointer-events:none;
    transition: opacity 0.25s ease;
    z-index:6;
    font-family: "Courier New", monospace;
  }
  .info-overlay.visible{
    opacity:1;
  }
  .info-title{
    font-size: clamp(11px, 3.4vw, 17px);
    font-weight:bold;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .info-sub{
    font-size: clamp(8px, 2.6vw, 12px);
    opacity:0.85;
    line-height:1.5;
  }

  /* ---------- Heart like burst ---------- */
  .like-burst{
    position:absolute;
    inset:0;
    z-index:7;
    pointer-events:none;
    overflow:hidden;
  }
  .like-burst span{
    position:absolute;
    bottom: 10%;
    font-size: clamp(16px, 7vw, 34px);
    opacity:0;
    animation: floatHeart 1.1s ease-out forwards;
  }
  @keyframes floatHeart{
    0%{
      opacity:0;
      transform: translateY(0) scale(0.4) rotate(var(--rot, 0deg));
    }
    15%{
      opacity:1;
      transform: translateY(-10%) scale(1.05) rotate(var(--rot, 0deg));
    }
    100%{
      opacity:0;
      transform: translateY(-160%) scale(0.9) rotate(var(--rot, 0deg));
    }
  }

  /* big center heart pulse when pressed */
  .center-pulse{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:8;
    pointer-events:none;
  }
  .center-pulse span{
    font-size: clamp(34px, 14vw, 70px);
    color:#ff5d96;
    text-shadow: 0 0 18px rgba(255,93,150,0.9);
    opacity:0;
    transform: scale(0.5);
  }
  .center-pulse.show span{
    animation: heartPop 0.6s ease-out forwards;
  }
  @keyframes heartPop{
    0%{ opacity:0; transform: scale(0.4); }
    35%{ opacity:1; transform: scale(1.2); }
    70%{ opacity:1; transform: scale(0.95); }
    100%{ opacity:0; transform: scale(1.05); }
  }

  /* favorite badge */
  .fav-badge{
    position:absolute;
    top: 3%;
    right: 4%;
    font-size: clamp(10px, 3.2vw, 16px);
    opacity:0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    transform: scale(0.7);
    z-index:6;
    filter: drop-shadow(0 0 4px rgba(255,90,150,0.8));
  }
  .fav-badge.on{
    opacity:1;
    transform: scale(1);
  }

  /* empty state */
  .empty-state{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:#7a7a85;
    font-family: "Courier New", monospace;
    font-size: clamp(9px, 2.8vw, 13px);
    padding: 0 10%;
    line-height:1.6;
    z-index:1;
  }

  /* ---------- HOTSPOTS (invisible button overlays) ---------- */
  .hotspot{
    position:absolute;
    cursor:pointer;
    background:transparent;
    border:none;
    padding:0;
    margin:0;
    -webkit-tap-highlight-color: transparent;
    outline:none;
    touch-action: manipulation;
  }

  .hotspot:active{
    filter: brightness(0.85);
  }

  /* visual press feedback ring */
  .hotspot::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    background: radial-gradient(circle, rgba(255,255,255,0.0) 60%, rgba(255,255,255,0.0) 100%);
    transition: background 0.15s ease;
    pointer-events:none;
  }
  .hotspot:active::after{
    background: radial-gradient(circle, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0) 70%);
  }

  /* D-pad arrow hotspots */
  .hs-up{    left: 44.5%; top: 76.0%; width: 11.0%; height: 4.8%; border-radius: 50% 50% 0 0; }
  .hs-down{  left: 44.5%; top: 88.8%; width: 11.0%; height: 4.8%; border-radius: 0 0 50% 50%; }
  .hs-left{  left: 30.8%; top: 81.3%; width: 10.5%; height: 7.5%; border-radius: 50% 0 0 50%; }
  .hs-right{ left: 58.7%; top: 81.3%; width: 10.5%; height: 7.5%; border-radius: 0 50% 50% 0; }

  /* Heart center hotspot */
  .hs-heart{
    left: 42.5%;
    top: 80.3%;
    width: 15.0%;
    height: 6.8%;
    border-radius: 50%;
  }

  /* Menu hotspot */
  .hs-menu{
    left: 8.5%;
    top: 80.8%;
    width: 13.5%;
    height: 7.8%;
    border-radius: 30px;
  }

  /* Toast for shutter / save (subtle, optional) */
  .toast{
    position:absolute;
    bottom: 2%;
    left:50%;
    transform: translateX(-50%) translateY(10px);
    background: rgba(20,14,22,0.7);
    color:#ffe9f2;
    font-family: "Courier New", monospace;
    font-size: clamp(8px, 2.4vw, 11px);
    padding: 4px 10px;
    border-radius: 20px;
    opacity:0;
    pointer-events:none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index:9;
    white-space:nowrap;
  }
  .toast.show{
    opacity:1;
    transform: translateX(-50%) translateY(0);
  }

  /* Caption strip under screen-less hint for first-time users */
  .hint{
    position:absolute;
    left: 7.62%;
    top: calc(18.98% + 49.35% + 0.8%);
    width: 76.2%;
    text-align:center;
    font-family: "Courier New", monospace;
    font-size: clamp(7px, 2.2vw, 10px);
    color: #c45c87;
    opacity: 0.65;
    letter-spacing: 0.5px;
    pointer-events:none;
  }

  @media (prefers-reduced-motion: reduce){
    .photo, .like-burst span, .center-pulse span, .rec-dot, .info-overlay, .fav-badge, .toast{
      animation: none !important;
      transition: none !important;
    }
  }
</style>
</head>
<body>

<div class="device" id="device">
  <img class="frame" src="camera.png" alt="Pink jeweled digital camera" draggable="false">

  <!-- LCD SCREEN -->
  <div class="screen" id="screen">
    <div class="screen-stage" id="stage">
      <!-- photos injected here by JS -->
      <div class="empty-state" id="emptyState">
        ☆ no photos yet ☆<br>add some memories below
      </div>
    </div>

    <div class="hud" id="hud" style="display:none;">
      <div class="hud-top">
        <span><span class="rec-dot"></span>DIGICAM</span>
        <span id="dateLabel">06.13</span>
      </div>
      <div class="zoom-indicator hidden" id="zoomIndicator">1.0x</div>
      <div class="hud-counter" id="counter">1 / 1</div>
    </div>

    <div class="fav-badge" id="favBadge">♥</div>

    <div class="info-overlay" id="infoOverlay">
      <div class="info-title" id="infoTitle">Untitled</div>
      <div class="info-sub" id="infoSub"></div>
    </div>

    <div class="like-burst" id="likeBurst"></div>
    <div class="center-pulse" id="centerPulse"><span>♥</span></div>

    <div class="toast" id="toast"></div>
  </div>

  <div class="hint" id="hint">◀ ▶ photos · ▲▼ zoom · ♥ like · MENU info</div>

  <!-- INVISIBLE BUTTON HOTSPOTS, positioned over the printed buttons -->
  <button class="hotspot hs-up"    id="btnUp"    aria-label="Zoom in"></button>
  <button class="hotspot hs-down"  id="btnDown"  aria-label="Zoom out"></button>
  <button class="hotspot hs-left"  id="btnLeft"  aria-label="Previous photo"></button>
  <button class="hotspot hs-right" id="btnRight" aria-label="Next photo"></button>
  <button class="hotspot hs-heart" id="btnHeart" aria-label="Like photo"></button>
  <button class="hotspot hs-menu"  id="btnMenu"  aria-label="Toggle info"></button>
</div>

<script>
(function(){

  // ============================================================
  // EDIT YOUR PHOTOS HERE
  // Add as many entries as you like. Each photo can have:
  //  - src: image URL
  //  - caption: short title shown in the info overlay
  //  - date: short date string
  // ============================================================
  const PHOTOS = [
    {
      src: "images/filtered1.jpg",
      caption: "ur so pretty",
      date: "pinterest-didnt-show 💔"
    },
    {
      src: "images/filtered2.jpg",
      caption: "ur so cute",
      date: "26-04-2024"
    },
    {
      src: "images/filtered3.jpg",
      caption: "chingchong child ",
      date: "pretty long ago"
    },
    {
      src: "images/filtered4.jpg",
      caption: "the mole 🫪",
      date: "idk u disabled ur ig 💔"
    },
    {
      src: "images/filtered5.jpg",
      caption: "tuff",
      date: "christmas eve ?"
    },
    {
      src: "images/filtered6.jpg",
      caption: "imagine if this was my morning view",
      date: "i-d-k"
    },
    {
      src: "images/filtered7.jpg",
      caption: "my dreams, right before my alarm rings on a monday morning",
      date: "random mornin in my dream"
    },
    {
      src: "images/filtered8.jpg",
      caption: "so cute",
      date: "26-04-2024"
    },
    {
      src: "images/filtered10.jpg",
      caption: "sorry if this was corny",
      date: "soon"
    }
  ];
  // ============================================================

  const stage      = document.getElementById('stage');
  const emptyState = document.getElementById('emptyState');
  const hud        = document.getElementById('hud');
  const counterEl  = document.getElementById('counter');
  const zoomEl     = document.getElementById('zoomIndicator');
  const dateLabel  = document.getElementById('dateLabel');
  const favBadge   = document.getElementById('favBadge');
  const infoOverlay= document.getElementById('infoOverlay');
  const infoTitle  = document.getElementById('infoTitle');
  const infoSub    = document.getElementById('infoSub');
  const likeBurst  = document.getElementById('likeBurst');
  const centerPulse= document.getElementById('centerPulse');
  const toast      = document.getElementById('toast');

  const btnUp    = document.getElementById('btnUp');
  const btnDown  = document.getElementById('btnDown');
  const btnLeft  = document.getElementById('btnLeft');
  const btnRight = document.getElementById('btnRight');
  const btnHeart = document.getElementById('btnHeart');
  const btnMenu  = document.getElementById('btnMenu');

  let current = 0;
  let zoomLevel = 1;
  const ZOOM_MIN = 1;
  const ZOOM_MAX = 2.5;
  const ZOOM_STEP = 0.25;

  let infoVisible = false;
  let imgEls = [];
  let favorites = new Set();

  // Build photo elements
  function init(){
    if (!PHOTOS.length){
      emptyState.style.display = 'flex';
      hud.style.display = 'none';
      return;
    }
    emptyState.style.display = 'none';
    hud.style.display = 'block';

    PHOTOS.forEach((p, i) => {
      const img = document.createElement('img');
      img.className = 'photo';
      img.src = p.src;
      img.alt = p.caption || ('photo ' + (i+1));
      img.draggable = false;
      if (i === 0) img.classList.add('active');
      stage.appendChild(img);
      imgEls.push(img);
    });

    updateHud();
  }

  function updateHud(){
    counterEl.textContent = (current + 1) + ' / ' + PHOTOS.length;
    const p = PHOTOS[current];
    dateLabel.textContent = p.date || '';
    favBadge.classList.toggle('on', favorites.has(current));
    updateZoomIndicator();
    if (infoVisible) updateInfo();
  }

  function updateZoomIndicator(){
    zoomEl.textContent = zoomLevel.toFixed(2).replace(/0$/, '') + 'x';
    if (zoomLevel > 1.001){
      zoomEl.classList.remove('hidden');
    } else {
      zoomEl.classList.add('hidden');
    }
    imgEls.forEach(img => {
      img.style.setProperty('--zoom', zoomLevel);
      if (zoomLevel > 1.001) img.classList.add('zoomed');
      else img.classList.remove('zoomed');
    });
  }

  function updateInfo(){
    const p = PHOTOS[current];
    infoTitle.textContent = p.caption || ('Photo ' + (current+1));
    infoSub.textContent = (p.date || '') + '   ·   ' + (current+1) + ' / ' + PHOTOS.length +
      (favorites.has(current) ? '   ·   ♥ favorited' : '');
  }

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toast.classList.remove('show'), 1200);
  }

  function goTo(index, direction){
    if (!PHOTOS.length) return;
    const prev = current;
    current = (index + PHOTOS.length) % PHOTOS.length;
    if (current === prev) return;

    // reset zoom on photo change
    zoomLevel = 1;

    const prevEl = imgEls[prev];
    const nextEl = imgEls[current];

    // set up exit animation for prev
    prevEl.classList.remove('active');
    prevEl.classList.add(direction === 'next' ? 'slide-left' : 'slide-right');

    // set up entrance for next
    nextEl.classList.remove('slide-left', 'slide-right', 'zoomed');
    nextEl.style.transition = 'none';
    nextEl.style.transform = direction === 'next' ? 'translateX(100%)' : 'translateX(-100%)';
    nextEl.style.opacity = '0';
    // force reflow
    void nextEl.offsetWidth;
    nextEl.style.transition = '';
    nextEl.classList.add('active');
    nextEl.style.transform = '';
    nextEl.style.opacity = '';

    // clean up prev classes after transition
    setTimeout(() => {
      prevEl.classList.remove('slide-left', 'slide-right');
      prevEl.style.transform = '';
      prevEl.style.opacity = '';
    }, 400);

    updateHud();
  }

  function nextPhoto(){ goTo(current + 1, 'next'); }
  function prevPhoto(){ goTo(current - 1, 'prev'); }

  function zoomIn(){
    zoomLevel = Math.min(ZOOM_MAX, +(zoomLevel + ZOOM_STEP).toFixed(2));
    updateZoomIndicator();
  }
  function zoomOut(){
    zoomLevel = Math.max(ZOOM_MIN, +(zoomLevel - ZOOM_STEP).toFixed(2));
    updateZoomIndicator();
  }

  function spawnLikeBurst(){
    const hearts = ['♥','♡','💗','💕'];
    const count = 6;
    for (let i = 0; i < count; i++){
      const span = document.createElement('span');
      span.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      const leftPct = 15 + Math.random() * 70;
      const rot = (Math.random() * 30 - 15);
      const delay = Math.random() * 0.25;
      span.style.left = leftPct + '%';
      span.style.setProperty('--rot', rot + 'deg');
      span.style.animationDelay = delay + 's';
      span.style.color = ['#ff5d96', '#ff8fb8', '#ffb6cf', '#ffffff'][i % 4];
      likeBurst.appendChild(span);
      setTimeout(() => span.remove(), 1400);
    }
  }

  function toggleFavorite(){
    if (favorites.has(current)){
      favorites.delete(current);
      showToast('removed from favorites');
    } else {
      favorites.add(current);
      showToast('added to favorites ♥');
    }
    favBadge.classList.toggle('on', favorites.has(current));
    spawnLikeBurst();

    centerPulse.classList.remove('show');
    void centerPulse.offsetWidth;
    centerPulse.classList.add('show');
    setTimeout(() => centerPulse.classList.remove('show'), 650);

    if (infoVisible) updateInfo();
  }

  function toggleInfo(){
    infoVisible = !infoVisible;
    if (infoVisible){
      updateInfo();
      infoOverlay.classList.add('visible');
    } else {
      infoOverlay.classList.remove('visible');
    }
  }

  // ---------------- wire up hotspots ----------------
  // helper to support both click and keyboard activation, prevent double-fire on touch
  function bind(el, handler){
    let lastTouch = 0;
    el.addEventListener('touchend', (e) => {
      lastTouch = Date.now();
      e.preventDefault();
      handler();
    }, { passive: false });
    el.addEventListener('click', (e) => {
      if (Date.now() - lastTouch < 500) return; // avoid double trigger from touch+click
      handler();
    });
  }

  bind(btnRight, nextPhoto);
  bind(btnLeft, prevPhoto);
  bind(btnUp, zoomIn);
  bind(btnDown, zoomOut);
  bind(btnHeart, toggleFavorite);
  bind(btnMenu, toggleInfo);

  // keyboard support
  document.addEventListener('keydown', (e) => {
    switch(e.key){
      case 'ArrowRight': nextPhoto(); break;
      case 'ArrowLeft': prevPhoto(); break;
      case 'ArrowUp': zoomIn(); e.preventDefault(); break;
      case 'ArrowDown': zoomOut(); e.preventDefault(); break;
      case 'Enter':
      case ' ':
        toggleFavorite(); e.preventDefault(); break;
      case 'm':
      case 'M':
        toggleInfo(); break;
    }
  });

  // swipe gestures on the screen itself
  (function(){
    const screen = document.getElementById('screen');
    let startX = 0, startY = 0, tracking = false;
    screen.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      startX = t.clientX; startY = t.clientY; tracking = true;
    }, {passive:true});
    screen.addEventListener('touchend', (e) => {
      if (!tracking) return;
      tracking = false;
      const t = e.changedTouches[0];
      const dx = t.clientX - startX;
      const dy = t.clientY - startY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40){
        if (dx < 0) nextPhoto(); else prevPhoto();
      }
    }, {passive:true});
  })();

  init();
})();
</script>

</body>
</html>
